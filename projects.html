<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.css" rel="stylesheet">
    <script src="https://kit.fontawesome.com/8fb3a30aab.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="styles.css" />

    <title>Projects - Gretel Alvarez Tang</title>
  </head>

  <body class="secondary-page projects-page-body">
    <header class="row justify-content-between py-3 mx-2">
      <div id="header-container"></div>
    </header>

    <main class="content secondary-main projects-page-main">
      <section class="secondary-hero" data-aos="fade-up">
        <span class="text-xs uppercase">Portfolio Archive</span>
        <h1>All Projects</h1>
        <p class="secondary-hero-copy">
          A broader view of selected work across branding, redesign, WordPress, Webflow, and custom-coded interfaces.
        </p>
      </section>

      <section class="projects-archive" data-aos="fade-up">
        <div id="projects-listing" class="projects-archive-grid"></div>
      </section>
    </main>

    <div id="footer-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aos@2.3.4/dist/aos.js"></script>
    <script>
      AOS.init({ duration: 800, once: true });
    </script>
    <script src="js/script.js"></script>
    <script src="js/projects.js"></script>
