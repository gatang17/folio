<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- FontAwesome -->
    <script
      src="https://kit.fontawesome.com/8fb3a30aab.js"
      crossorigin="anonymous"
    ></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="row justify-content-between py-3 mx-2">
      <div id="header-container"></div>
    </header>

    <!-- BREADCRUMBS -->
    <div id="breadcrumb"></div>

    <!-- PROJECT LIST -->
    <main class="container mb-5 dnotes">
      <div class="div_1">
        <div id="">
          <h1 id="t_dnote"></h1>
          <p id="dno_descrip"></p>
        </div>
      </div>
      <div id="pdn_link"></div>
      <section id="sec_2">      
         
          <div id="sec_diag"></div>       
       
      </section>
      <div class="row">
        <a href="index.html#contact" class="btn m_text mosaic_btn my-5"
          >Let's Create something</a
        >
      </div>
    </main>
    <style>

      .dnotes {
        padding: 2rem;
      }

      #sec_diag {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(1000px, 1fr));   
        justify-items: start;
        align-items: baseline;
         gap: 2rem;       
      }
      
      .diag-card {   
        padding: 2rem; 
        break-inside: avoid;
        margin-bottom: 16px;        
        column-count: 2;       
        column-gap: 16px;
      }

      .diag-img {
        max-width: 500px;
        width: 100%;
        height: auto;
        mix-blend-mode: darken;
      }

      @media (max-width: 768px) {
        .diag-card { 
        break-inside: avoid;
        column-count: 1;   
      }
        #sec_diag {
        grid-template-columns: 1fr; /* se apilan en móvil */
      }
       
      }
    </style>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="js/script.js"></script>
    <div id="footer-container"></div>
  </body>
</html>
