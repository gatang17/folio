<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Portfolio</title>

    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- FontAwesome -->
    <script
      src="https://kit.fontawesome.com/8fb3a30aab.js"
      crossorigin="anonymous"
    ></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header class="row justify-content-between py-3 mx-2">
      <div id="header-container"></div>
    </header>

    <!-- BREADCRUMBS -->
    <div id="breadcrumb"></div>

    <!-- PROJECT LIST -->
    <main class="container mb-5 dnotes">
      <div class="div_1">
        <div id="">
          <h1 id="t_dnote"></h1>
          <p id="dno_descrip"></p>
        </div>
      </div>
      <div id="pdn_link"></div>
      <section id="sec_2">
        <div class="div_grid">
          <div id=""></div>
          <div id="sec_diag"></div>
        </div>
        <div id="sec_diag" class="d-flex flex-wrap gap-3"></div>
      </section>
      <div class="row">
        <a href="index.html#contact" class="btn m_text mosaic_btn my-5"
          >Let's Create something</a
        >
      </div>
    </main>
    <style>
      .dnotes {
        padding: 2rem;
      }
      #sec_2 {
        justify-items: center;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(100%, 1fr));
        gap: 2rem;
      }
      #sec_diag {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
      }
      .diag-card {
        display: flex;
        flex-direction: row;
        align-content: center;
        align-items: center;
        justify-content: flex-start;
        flex-wrap: wrap;
        column-gap: 90px;
      }

      .diag-img {
        max-width: 50vw;
        width: 100%;
        height: auto;
        mix-blend-mode: darken;
      }
      @media (max-width: 768px) {
        #sec_2 {
          grid-template-columns: 1fr; /* se apilan en móvil */
        }
      }
    </style>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="js/script.js"></script>
    <div id="footer-container"></div>
  </body>
</html>
